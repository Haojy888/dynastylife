    <!-- 加载屏(内联样式,首屏即显) -->
    <style>
      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: linear-gradient(160deg, #eef4f1, #f5ead8);
        transition: opacity 0.45s ease;
        font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      }
      #boot-loader.done {
        opacity: 0;
        pointer-events: none;
      }
      .boot-seal {
        width: 84px;
        height: 84px;
        border-radius: 20px;
        background: linear-gradient(135deg, #c0392b, #96281b);
        box-shadow: 0 14px 34px rgba(150, 40, 27, 0.35), inset 0 0 0 3px rgba(245, 215, 142, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fdf6e3;
        font-size: 52px;
        font-weight: 700;
        font-family: SimSun, "Microsoft YaHei", serif;
        animation: boot-breathe 1.6s ease-in-out infinite;
      }
      .boot-title {
        color: #2c3030;
        font-size: 22px;
        letter-spacing: 0.34em;
        text-indent: 0.34em;
      }
      .boot-track {
        width: 180px;
        height: 4px;
        border-radius: 999px;
        background: rgba(47, 125, 109, 0.16);
        overflow: hidden;
      }
      .boot-track::after {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #2f7d6d, #c2743f);
        animation: boot-slide 1.2s ease-in-out infinite;
      }
      .boot-hint {
        color: #68706d;
        font-size: 13px;
        letter-spacing: 0.18em;
        text-indent: 0.18em;
      }
      @keyframes boot-breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }
      @keyframes boot-slide {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(390%); }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-seal, .boot-track::after { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" aria-label="载入中">
      <div class="boot-seal">生</div>
      <div class="boot-title">古代人生</div>
      <div class="boot-track" role="progressbar" aria-label="载入进度"></div>
      <div class="boot-hint">正在铺开一生的画卷…</div>
    </div>

    <canvas id="lightfall-bg" class="lightfall-bg" aria-hidden="true"></canvas>
    <div id="app" class="app"></div>

    <noscript>
      <div style="position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; background: #f5ead8; color: #2c3030; font-size: 16px; padding: 24px; text-align: center;">
        本游戏需要启用 JavaScript 才能运行,请在浏览器设置中开启后刷新页面。
      </div>
    </noscript>

    <script src="game-data.js" defer></script>
    <script src="app.js" defer></script>
    <script>
      // 游戏渲染完成后淡出加载屏
      window.addEventListener("DOMContentLoaded", function () {
        var loader = document.getElementById("boot-loader");
        if (!loader) return;
        requestAnimationFrame(function () {
          loader.classList.add("done");
          setTimeout(function () {
            loader.remove();
          }, 500);
        });
      });
    </script>
  </body>
