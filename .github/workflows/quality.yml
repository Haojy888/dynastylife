name: Quality gate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/package-lock.json
      - run: npm ci --prefix tools
      - run: npm run test:syntax --prefix tools
      - run: npm test --prefix tools
